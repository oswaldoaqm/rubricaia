# =============================================================================
# RúbricaIA - Infraestructura como Código (Serverless Framework v4)
# -----------------------------------------------------------------------------
# Reemplaza los scripts deploy/*.sh: UNA sola fuente declarativa de toda la
# arquitectura: S3, SQS+DLQ, DynamoDB x2 (una con Streams), EventBridge, SNS,
# API Gateway y 7 Lambdas (auth, lms, api, splitter, worker, aggregator, report).
#
# >>> CLAVE PARA AWS LEARNER LAB <<<
#   - provider.iam.role pinea el LabRole existente. Learner Lab NO permite crear
#     roles IAM, asi que TODAS las funciones reutilizan LabRole y SF no intenta
#     crear roles (lo que de otra forma haria fallar el deploy).
#   - GROQ_API_KEY se toma del entorno del shell (no se commitea nunca).
#
# Deploy:
#   export GROQ_API_KEY="gsk_..."
#   serverless deploy
#
# Ver outputs (incluida la URL del API):
#   serverless info
# =============================================================================

org: oswaldoaqm
app: rubricaia
service: rubricaia

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}

  # --- Learner Lab: reutilizar el rol existente en todas las funciones --------
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole

  # --- API Gateway HTTP API con CORS abierto (demo) ---------------------------
  httpApi:
    cors: true

  # --- Variables de entorno compartidas por las Lambdas -----------------------
  environment:
    TABLE_NAME: ${self:service}-${sls:stage}
    QUEUE_URL: !Ref JobsQueue
    BUCKET: ${self:custom.bucketName}
    GROQ_API_KEY: ${env:GROQ_API_KEY}
    GROQ_MODEL: llama-3.3-70b-versatile
    MAX_ATTEMPTS: '3'
    URL_EXPIRES: '300'
    # --- Fase 3B: bus de eventos de dominio + notificacion al docente ---------
    BUS_NAME: ${self:service}-events-${sls:stage}
    TOPIC_ARN: !Ref NotifyTopic
    # --- Features extra (tunables; tienen default en codigo) ------------------
    RETRY_BASE_SECONDS: '5'     # F3: base del backoff exponencial
    RETRY_CAP_SECONDS: '300'    # F3: tope del backoff
    SIM_THRESHOLD: '0.6'        # F4: umbral de similitud (coseno TF-IDF)
    RAG_URL: ${env:RAG_URL, ''} # G2: servicio RAG en OCI (multinube); vacío = sin RAG
    # --- Plano de control (multi-tenant): auth + LMS --------------------------
    LMS_TABLE: ${self:service}-lms-${sls:stage}
    JWT_SECRET: ${env:JWT_SECRET}
    ALLOWED_DOMAIN: utec.edu.pe
    TEACHER_EMAILS: ${env:TEACHER_EMAILS, ''}
    DEFAULT_RUBRICA: '1) Define un problema real y concreto. 2) Identifica al usuario afectado. 3) Describe el caso de uso. 4) Justifica el impacto esperado con metricas. 5) Redaccion clara y estructurada.'

custom:
  # Nombre del bucket: global-unico (incluye accountId) y por stage.
  bucketName: ${self:service}-inputs-${aws:accountId}-${sls:stage}

# Empaquetado individual: cada Lambda solo lleva su propio .py (sin deps externas).
package:
  individually: true

functions:
  # --- Splitter: S3 -> SQS (un evento por entregable) -------------------------
  splitter:
    handler: backend/lambdas/splitter/splitter_lambda.handler
    timeout: 60
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/splitter/splitter_lambda.py'
    # Sin 'events' aqui a proposito: el trigger S3 -> Splitter se define en
    # 'resources' (InputsBucket) para poder declarar tambien el CORS del bucket.

  # --- Worker: SQS -> Groq -> DynamoDB (con reintentos/DLQ) --------------------
  worker:
    handler: backend/lambdas/worker/worker_lambda.handler
    timeout: 60
    memorySize: 256
    # Throttle anti rate-limit de Groq: max 3 ejecuciones simultaneas.
    # (Si Learner Lab limita la concurrencia de cuenta, comenta esta linea.)
    reservedConcurrency: 3
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/worker/worker_lambda.py'
    events:
      - sqs:
          arn: !GetAtt JobsQueue.Arn
          batchSize: 5
          functionResponseType: ReportBatchItemFailures

  # --- API: presigned URL + lectura de resultados -----------------------------
  api:
    handler: backend/lambdas/api/api_lambda.handler
    timeout: 30
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/api/api_lambda.py'
        - 'backend/common/authlib.py'
    events:
      - httpApi: '*'

  # --- Aggregator: DynamoDB Streams -> estadisticas de la clase en vivo --------
  aggregator:
    handler: backend/lambdas/aggregator/aggregator_lambda.handler
    timeout: 30
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/aggregator/aggregator_lambda.py'
    events:
      - stream:
          type: dynamodb
          arn: !GetAtt JobsTable.StreamArn
          batchSize: 10
          startingPosition: LATEST

  # --- Auth (plano de control): signup/login + JWT ----------------------------
  auth:
    handler: backend/lambdas/auth/auth_lambda.handler
    timeout: 30
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/auth/auth_lambda.py'
        - 'backend/common/authlib.py'
    events:
      - httpApi: 'POST /auth/signup'
      - httpApi: 'POST /auth/login'

  # --- LMS (plano de control): clases, membresias y tareas --------------------
  lms:
    handler: backend/lambdas/lms/lms_lambda.handler
    timeout: 30
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/lms/lms_lambda.py'
        - 'backend/common/authlib.py'
    events:
      - httpApi: 'POST /classes'
      - httpApi: 'GET /classes'
      - httpApi: 'POST /classes/delete'
      - httpApi: 'POST /classes/invite'
      - httpApi: 'POST /classes/remove'
      - httpApi: 'POST /classes/accept'
      - httpApi: 'GET /classes/detail'
      - httpApi: 'POST /tasks'
      - httpApi: 'POST /tasks/update'
      - httpApi: 'POST /tasks/delete'
      - httpApi: 'GET /tasks/submissions'
      - httpApi: 'GET /tasks/attempts'

  # --- Report (Fase 3B): EventBridge JobCompleted -> reporte de clase a S3 -----
  # Sin 'events' aqui a proposito: el trigger EventBridge -> Report se declara en
  # 'resources' (JobCompletedRule + ReportEventsPermission), igual que el patron
  # S3 -> Splitter, para controlar permisos en Learner Lab sin tocar LabRole.
  report:
    handler: backend/lambdas/report/report_lambda.handler
    timeout: 60
    memorySize: 256
    package:
      patterns:
        - '!**'
        - 'backend/lambdas/report/report_lambda.py'

resources:
  Resources:
    # --- DynamoDB: estado y resultados por entregable -------------------------
    JobsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        # Streams: cada cambio en un entregable dispara al Aggregator.
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    # --- DynamoDB LMS: usuarios, clases, tareas y membresias (multi-tenant) ---
    # Tabla separada del pipeline para no tocar lo que ya funciona. Diseño PK/SK:
    #   USER#<email>  / PROFILE              -> cuenta (rol, hash de contraseña)
    #   USER#<email>  / MEMBERSHIP#<classId> -> espejo: clases del alumno
    #   CLASS#<id>    / META                 -> clase (nombre, dueño)
    #   CLASS#<id>    / MEMBER#<email>       -> roster (estado invited/active)
    #   CLASS#<id>    / TASK#<taskId>        -> tarea (rubrica, pesos, fecha)
    LmsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-lms-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    # --- SQS DLQ: mensajes que agotaron sus reintentos ------------------------
    JobsDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-dlq-${sls:stage}
        MessageRetentionPeriod: 1209600  # 14 dias

    # --- SQS principal: bus de eventos + redrive a la DLQ ---------------------
    JobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-jobs-${sls:stage}
        VisibilityTimeout: 120           # >= timeout del Worker (60s)
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt JobsDLQ.Arn
          maxReceiveCount: 3

    # --- S3: bucket de entrada con CORS + trigger al Splitter ----------------
    # Permiso para que S3 pueda invocar al Splitter (debe existir antes que la
    # notificacion del bucket, por eso el DependsOn).
    SplitterS3Permission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !GetAtt SplitterLambdaFunction.Arn
        Action: lambda:InvokeFunction
        Principal: s3.amazonaws.com
        SourceAccount: ${aws:accountId}
        SourceArn: arn:aws:s3:::${self:custom.bucketName}

    InputsBucket:
      Type: AWS::S3::Bucket
      DependsOn: SplitterS3Permission
      Properties:
        BucketName: ${self:custom.bucketName}
        # CORS: el navegador sube el CSV con presigned URL (PUT) desde Amplify.
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ['*']
              AllowedMethods: [PUT, GET, HEAD]
              AllowedHeaders: ['*']
              ExposedHeaders: [ETag]
        # Trigger: cada CSV nuevo en inputs/ dispara al Splitter.
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Filter:
                S3Key:
                  Rules:
                    - Name: prefix
                      Value: inputs/
                    - Name: suffix
                      Value: .csv
              Function: !GetAtt SplitterLambdaFunction.Arn

    # =========================================================================
    # FASE 3B - Arquitectura de eventos de dominio: cuando un lote termina,
    # el Aggregator publica un evento "JobCompleted" en un bus de EventBridge.
    # El bus hace fan-out a DOS consumidores independientes:
    #   (1) SNS  -> email al docente.
    #   (2) Report Lambda -> genera el reporte de clase (CSV/JSON/HTML) en S3.
    # Cada uno reacciona por su cuenta; agregar/quitar consumidores no toca al
    # productor. Eso es desacoplamiento event-driven real (no SQS punto a punto).
    # =========================================================================

    # --- Bus de eventos de dominio -------------------------------------------
    EventsBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:service}-events-${sls:stage}

    # --- SNS: tema de notificacion al docente --------------------------------
    NotifyTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-notify-${sls:stage}
        DisplayName: RubricaIA

    # Suscripcion por email. OJO: AWS envia un correo de confirmacion; el
    # docente DEBE hacer clic en "Confirm subscription" una vez (queda confirmado
    # para siempre). Pon el correo con: export TEACHER_EMAIL="docente@dominio.com"
    NotifySubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref NotifyTopic
        Protocol: email
        Endpoint: ${env:TEACHER_EMAIL}

    # Permite que EventBridge publique en el tema (permiso basado en recurso,
    # no toca el LabRole).
    NotifyTopicPolicy:
      Type: AWS::SNS::TopicPolicy
      Properties:
        Topics:
          - !Ref NotifyTopic
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: AllowEventBridgePublish
              Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sns:Publish
              Resource: !Ref NotifyTopic

    # --- Regla del bus: JobCompleted -> SNS + Report Lambda (fan-out) ---------
    JobCompletedRule:
      Type: AWS::Events::Rule
      Properties:
        Name: ${self:service}-jobcompleted-${sls:stage}
        EventBusName: !Ref EventsBus
        State: ENABLED
        EventPattern:
          source:
            - rubricaia.aggregator
          detail-type:
            - JobCompleted
        Targets:
          # (1) Email al docente. InputTransformer = mensaje legible (no el JSON crudo).
          - Id: NotifyTeacher
            Arn: !Ref NotifyTopic
            InputTransformer:
              InputPathsMap:
                jobId: '$.detail.jobId'
                total: '$.detail.total'
                done: '$.detail.done'
                failed: '$.detail.failed'
                promedio: '$.detail.promedio'
              InputTemplate: '"RubricaIA: el lote <jobId> termino de evaluarse. Entregables: <total> | Evaluados OK: <done> | Con error: <failed> | Promedio de la clase: <promedio>%. Descarga el reporte completo desde el panel de RubricaIA."'
          # (2) Report Lambda. Recibe el evento completo (detail.jobId).
          - Id: ReportLambda
            Arn: !GetAtt ReportLambdaFunction.Arn

    # Permite que EventBridge invoque la Report Lambda (permiso basado en recurso).
    ReportEventsPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !GetAtt ReportLambdaFunction.Arn
        Action: lambda:InvokeFunction
        Principal: events.amazonaws.com
        SourceArn: !GetAtt JobCompletedRule.Arn

  Outputs:
    BucketName:
      Value: ${self:custom.bucketName}
    TableName:
      Value: ${self:service}-${sls:stage}
    QueueUrl:
      Value: !Ref JobsQueue
    NotifyTopicArn:
      Value: !Ref NotifyTopic
    EventsBusName:
      Value: ${self:service}-events-${sls:stage}
